name: Trade (paper)

# Runs the portfolio bot on a schedule so it trades without your laptop.
# Your Alpaca keys come from repository Secrets (Settings -> Secrets and
# variables -> Actions). See deploy/CLOUD.md for setup.

on:
  schedule:
    # Every 30 min during US market hours, Mon-Fri. Cron is UTC; the 13:30-21:00
    # window covers 9:30am-4:00pm ET in summer (EDT) and most of the session in
    # winter (EST). GitHub may delay/skip crons a few minutes under load. The
    # regime only changes once per day (completed bars) — this cadence is mainly
    # for fast circuit-breaker response to intraday drawdowns.
    - cron: "30 13 * * 1-5"
    - cron: "0,30 14-20 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch:      # manual "Run workflow" button
    inputs:
      force:
        description: "Force a rebalance now (ignore the monthly cadence)"
        type: boolean
        default: false

# Never let two runs trade at once (they'd race on the cached state).
concurrency:
  group: trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
      ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the bot's state (last rebalance date, challenge start) from the
      # previous run. Miss falls back to the most recent rt-state-* cache.
      - name: Restore bot state
        uses: actions/cache/restore@v4
        with:
          path: state
          key: rt-state-${{ github.run_id }}
          restore-keys: rt-state-

      - name: Run one trading iteration
        run: |
          mkdir -p state   # ensure the cache path exists even on a no-op run
          python -m regime_trader.main portfolio --once ${{ inputs.force && '--force' || '' }}

      # Save the updated state for the next run.
      - name: Save bot state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: rt-state-${{ github.run_id }}
