# =============================================================================
# Regime Trader — central configuration
# Everything you would normally tune lives here. Change tickers, HMM params,
# strategy allocations, and risk limits WITHOUT touching code.
# =============================================================================

broker:
  name: alpaca
  paper: true              # paper trading is the default and strongly recommended
  data_feed: iex           # alpaca data feed (iex is free); 'sip' needs a subscription

universe:
  # Tickers the bot trades / classifies. The first ticker is the "regime anchor"
  # used to detect the market-wide volatility regime.
  tickers: ["SPY"]
  regime_anchor: "SPY"

hmm:
  # The brain. It does NOT predict price — it classifies the volatility regime.
  min_regimes: 3           # search this many...
  max_regimes: 7           # ...through this many, and auto-pick the best by BIC
  train_lookback_days: 504 # ~2 years of daily bars to fit on
  covariance_type: "diag"
  n_iter: 200
  random_state: 42
  # Stability filter: a regime must persist this many consecutive bars before
  # the system acts on it. Reduces whipsaw from a flickering classifier.
  min_persistence_bars: 3
  # If the regime flips more than this many times in the lookback window, treat
  # the market as "uncertain" and shrink position sizes.
  max_flips_in_window: 4
  flip_window_bars: 20

strategy:
  # Regime-driven allocation. THIS is the part you customize to your own edge.
  # Each regime maps to a target portfolio exposure and leverage.
  # gross_exposure is the fraction of equity to deploy; leverage multiplies it.
  regimes:
    crash:
      gross_exposure: 0.00
      leverage: 1.00
      direction: flat
    bear:
      gross_exposure: 0.00
      leverage: 1.00
      direction: flat
    neutral:
      gross_exposure: 0.40
      leverage: 1.00
      direction: long
    bull:
      gross_exposure: 0.95
      leverage: 1.00
      direction: long
    euphoria:
      gross_exposure: 0.95
      leverage: 1.25
      direction: long
  # Only rebalance when target weight drifts more than this from current weight.
  rebalance_threshold: 0.05
  # Scale exposure by HMM confidence (posterior prob of the active regime).
  # Disabled: the sweep showed it cut returns more than it cut risk, lowering Sharpe.
  confidence_scaling: false
  min_confidence: 0.50

risk:
  # The safety net. These run INDEPENDENTLY of the strategy and have veto power.
  max_risk_per_trade: 0.01     # risk at most 1% of equity per position
  max_leverage: 1.25
  max_position_weight: 1.00    # cap any single name at this fraction of equity
  max_correlation: 0.80        # block a new position correlated above this
  # Circuit breakers (drawdown is measured from the running equity peak):
  daily_loss_halve: 0.02       # down 2% on the day -> cut all sizes in half
  daily_loss_flatten: 0.03     # down 3% on the day -> close everything
  weekly_loss_halve: 0.05      # down 5% on the week -> cut all sizes in half
  max_drawdown_stop: 0.10      # down 10% from peak -> HARD STOP + block file
  block_file: "TRADING_BLOCKED"

backtest:
  in_sample_days: 252          # rolling train window (1 trading year)
  out_sample_days: 126         # rolling test window (~6 months)
  step_days: 126               # walk-forward step
  slippage_bps: 5              # round-trip slippage assumption, basis points
  commission_bps: 0
  initial_equity: 100000

portfolio:
  # Cross-sectional momentum + HMM regime overlay + volatility targeting.
  # This is the "beat the index" strategy: hold the strongest-trending S&P names,
  # scale the whole basket by the regime, and target a constant volatility so the
  # drawdown respects the risk manager's circuit breaker.
  enabled: true
  mode: momentum               # "momentum" (this strategy) or "anchor" (single-ticker)
  top_n: 10                    # hold the top N momentum names, equal weighted
  momentum_lookback: 252       # 12-month trailing window for momentum...
  momentum_skip: 21            # ...skipping the most recent month (reversal guard)
  # "Trend-quality" selection upgrades. Default off until the backtest proves
  # them out (then flip on). See scripts/strategy_ablation.py.
  risk_adjusted_momentum: false  # A2: rank by return / volatility, not raw return
  trend_filter: false            # A3: only hold names above their own trend_ma average
  trend_ma: 200
  weighting: equal               # B1: "equal" or "inverse_vol" basket weighting
  vol_weight_lookback: 60
  rebalance_days: 21           # re-rank / rebalance roughly monthly
  daily_derisk: true           # between rebalances, go to cash same-day if the
                               # regime turns risk-off (bear/crash) instead of waiting
  target_vol: 0.09             # annualised vol target (keeps drawdown < ~10%)
  vol_lookback: 20             # trailing window for realised-vol estimate
  max_leverage: 1.50           # cap on basket gross exposure
  # This strategy's regime overlay works best with fewer regimes than the global
  # hmm setting: 6-7 regimes fragment the signal and backtest materially worse
  # (Sharpe 1.28 @ 5 regimes vs 0.90 @ 7). The single-ticker mode prefers more.
  regime_max_regimes: 5
  # Regime -> base gross exposure on the basket (the HMM risk overlay). Vol
  # targeting then scales the whole strategy to the target vol, so bear/crash ->
  # cash is the regime's main job; the exact neutral fraction is second-order.
  regime_gross:
    crash: 0.00
    bear: 0.00
    neutral: 0.60
    bull: 1.00
    euphoria: 1.00
  # Diversified large-cap universe (includes laggards on purpose to limit
  # survivorship bias). The regime anchor (SPY) above drives the overlay.
  universe:
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - GOOGL
    - META
    - TSLA
    - ORCL
    - CSCO
    - INTC
