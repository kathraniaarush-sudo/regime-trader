execution:
  bar_interval: "1Day"         # bar granularity for the live loop
  poll_seconds: 60             # how often the live loop wakes up

monitoring:
  log_dir: "logs"
  alerts:
    enabled: false
    webhook_url: ""            # optional Slack/Discord webhook for critical alerts
    email: ""
